<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ChessGame — Benchmark</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                max-width: 900px;
                margin: 40px auto;
                padding: 0 20px;
                background: #0f1117;
                color: #e2e8f0;
            }
            h1 {
                font-size: 1.4rem;
                margin-bottom: 4px;
            }
            .subtitle {
                color: #64748b;
                font-size: 0.85rem;
                margin-bottom: 28px;
            }

            .controls {
                display: flex;
                align-items: center;
                gap: 16px;
                margin-bottom: 24px;
                flex-wrap: wrap;
            }
            label {
                font-size: 0.9rem;
                color: #94a3b8;
            }
            select {
                background: #1e293b;
                color: #e2e8f0;
                border: 1px solid #334155;
                border-radius: 6px;
                padding: 6px 10px;
                font-size: 0.9rem;
                cursor: pointer;
            }
            button {
                background: #3b82f6;
                color: white;
                border: none;
                border-radius: 6px;
                padding: 7px 18px;
                font-size: 0.9rem;
                cursor: pointer;
                transition: background 0.15s;
            }
            button:hover {
                background: #2563eb;
            }
            button:disabled {
                background: #334155;
                cursor: not-allowed;
            }

            #status {
                font-size: 0.85rem;
                color: #64748b;
                min-height: 1.2em;
                margin-bottom: 12px;
            }

            .legend {
                display: flex;
                gap: 20px;
                font-size: 0.78rem;
                margin-bottom: 16px;
                color: #64748b;
            }
            .legend span::before {
                content: "● ";
            }
            .legend .fast::before {
                color: #4ade80;
            }
            .legend .warn::before {
                color: #fbbf24;
            }
            .legend .slow::before {
                color: #f87171;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.88rem;
            }
            th {
                text-align: left;
                padding: 8px 10px;
                border-bottom: 1px solid #334155;
                color: #64748b;
                font-weight: 500;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            td {
                padding: 7px 10px;
                border-bottom: 1px solid #1e293b;
                font-variant-numeric: tabular-nums;
            }
            tr:last-child td {
                border-bottom: none;
            }
            .col-pos {
                color: #94a3b8;
            }
            .num {
                font-family: monospace;
            }
            .fast {
                color: #4ade80;
            }
            .warn {
                color: #fbbf24;
            }
            .slow {
                color: #f87171;
            }
            .aborted {
                color: #fbbf24;
                font-style: italic;
            }
            .sep td {
                background: #1e293b;
                padding: 2px;
            }
            .msg td {
                color: #64748b;
                font-style: italic;
                padding: 10px;
            }

            th[title] {
                cursor: help;
                border-bottom: 1px dashed #475569;
            }
            .native-section {
                margin-top: 40px;
                padding-top: 24px;
                border-top: 1px solid #1e293b;
            }
            .native-section h2 {
                font-size: 1rem;
                font-weight: 500;
                color: #94a3b8;
                margin-bottom: 8px;
            }
            .native-section p {
                font-size: 0.82rem;
                color: #475569;
                margin-bottom: 10px;
            }
            textarea {
                width: 100%;
                height: 80px;
                background: #1e293b;
                color: #e2e8f0;
                border: 1px solid #334155;
                border-radius: 6px;
                padding: 8px 10px;
                font-family: monospace;
                font-size: 0.8rem;
                resize: vertical;
                box-sizing: border-box;
            }
            .ratio-up { color: #4ade80; }
            .ratio-down { color: #f87171; }
            .ratio-eq { color: #94a3b8; }
            .native-col { color: #93c5fd; }

            .table-wrapper {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            @media (max-width: 768px) {
                body {
                    margin: 20px auto;
                    padding: 0 12px;
                }
                h1 {
                    font-size: 1.15rem;
                }
                .controls {
                    flex-direction: column;
                    align-items: stretch;
                    gap: 10px;
                }
                .controls label {
                    display: flex;
                    flex-direction: column;
                    gap: 4px;
                }
                .controls select,
                .controls button {
                    width: 100%;
                    padding: 10px;
                    font-size: 1rem;
                }
                table {
                    font-size: 0.78rem;
                }
                th,
                td {
                    padding: 6px 8px;
                }
            }
        </style>
    </head>
    <body>
        <h1>ChessGame — Benchmark</h1>
        <p class="subtitle">Rust → WASM, single-threaded</p>
        <p id="native-badge" style="display:none;font-size:0.8rem;color:#4ade80;margin-top:-20px;margin-bottom:20px;">✓ Native results loaded — comparison active</p>

        <div class="controls">
            <label>
                Max depth
                <select id="max-depth">
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10" selected>10</option>
                    <option value="11">11</option>
                </select>
            </label>
            <label>
                Position
                <select id="position">
                    <option value="both" selected>Both</option>
                    <option value="start">Start only</option>
                    <option value="kiwipete">Kiwipete only</option>
                </select>
            </label>
            <button id="run">▶ Run</button>
        </div>

        <div id="status"></div>

        <div class="table-wrapper">
            <table id="main-table">
                <thead>
                    <tr id="thead-row">
                        <th>Depth</th>
                        <th>Position</th>
                        <th title="Total alpha-beta nodes visited">Nodes</th>
                        <th title="Quiescence search nodes (captures only, depth=0 extension)">Q-nodes</th>
                        <th title="Time to return a move">Time</th>
                        <th title="Nodes per second">NPS</th>
                        <th title="Cutoffs / interior nodes × 100. Higher = better move ordering.">Cut%</th>
                        <th title="Effective Branching Factor = nodes^(1/depth). Lower = better pruning.">EBF</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>

        <div class="native-section">
            <h2>Compare with native</h2>
            <p>Run <code>cargo run --release --features native --bin bench -- 8 2>/dev/null</code> and paste the JSON output below.</p>
            <textarea id="native-json" placeholder='[{"label":"Start","depth":6,"nodes":...}, ...]'></textarea>
            <button id="load-native" style="margin-top:8px;">Load native results</button>
            <div id="native-error" style="color:#f87171;font-size:0.82rem;margin-top:6px;display:none;"></div>
        </div>

        <script type="module">
            import init, { run_bench } from "./chess_game.js";
            await init();

            const runBtn = document.getElementById("run");
            const statusEl = document.getElementById("status");
            const tbody = document.getElementById("tbody");
            const theadRow = document.getElementById("thead-row");

            // keyed by `${depth}-${label}` → entry
            const wasmResults = {};
            let nativeResults = {};
            let compareMode = false;

            function timeClass(ms) {
                if (ms < 200) return "fast";
                if (ms < 500) return "warn";
                return "slow";
            }
            function fmtTime(ms) {
                if (ms < 1) return "< 1 ms";
                if (ms < 1000) return ms.toFixed(1) + " ms";
                return (ms / 1000).toFixed(2) + " s";
            }
            function fmtNum(n) {
                return Number(n).toLocaleString("en-US");
            }
            function colCount() { return compareMode ? 11 : 8; }

            function addSeparator() {
                const tr = document.createElement("tr");
                tr.className = "sep";
                tr.innerHTML = `<td colspan="${colCount()}"></td>`;
                tbody.appendChild(tr);
            }

            function ratioClass(r) {
                if (r >= 1.05) return "ratio-up";
                if (r <= 0.95) return "ratio-down";
                return "ratio-eq";
            }
            function ratioStr(r) {
                const sign = r >= 1 ? "+" : "";
                return `${sign}${((r - 1) * 100).toFixed(0)}%`;
            }

            function addRow(e) {
                const tr = document.createElement("tr");
                const timeCol = e.aborted
                    ? `<span class="aborted">${fmtTime(e.time_ms)} (aborted)</span>`
                    : `<span class="${timeClass(e.time_ms)}">${fmtTime(e.time_ms)}</span>`;
                const qNodes = e.q_nodes > 0
                    ? fmtNum(e.q_nodes)
                    : `<span style="color:#475569">—</span>`;

                let extra = "";
                if (compareMode) {
                    const n = nativeResults[`${e.depth}-${e.label}`];
                    if (n) {
                        const ratio = n.nps / (e.nps || 1);
                        extra =
                            `<td class="num native-col">${fmtNum(n.nps)} n/s</td>` +
                            `<td class="num native-col">${fmtTime(n.time_ms)}</td>` +
                            `<td class="num ${ratioClass(ratio)}">${ratioStr(ratio)}</td>`;
                    } else {
                        extra = `<td colspan="3" style="color:#475569">—</td>`;
                    }
                }

                tr.innerHTML =
                    `<td class="num">${e.depth}</td>` +
                    `<td class="col-pos">${e.label}</td>` +
                    `<td class="num">${fmtNum(e.nodes)}</td>` +
                    `<td class="num">${qNodes}</td>` +
                    `<td class="num">${timeCol}</td>` +
                    `<td class="num">${fmtNum(e.nps)} n/s</td>` +
                    `<td class="num">${e.cut_pct.toFixed(1)}%</td>` +
                    `<td class="num">${e.ebf.toFixed(2)}</td>` +
                    extra;
                tbody.appendChild(tr);
            }

            function setCompareHeaders(on) {
                const existing = theadRow.querySelectorAll(".native-th");
                existing.forEach(el => el.remove());
                if (on) {
                    ["Native NPS", "Native Time", "Ratio"].forEach(label => {
                        const th = document.createElement("th");
                        th.className = "native-th native-col";
                        th.textContent = label;
                        theadRow.appendChild(th);
                    });
                }
            }

            function redrawTable() {
                tbody.innerHTML = "";
                const pos = document.getElementById("position").value;
                const seen = new Set();
                const keys = Object.keys(wasmResults).sort((a, b) => {
                    const [da, la] = a.split("-");
                    const [db, lb] = b.split("-");
                    return da - db || la.localeCompare(lb);
                });
                let lastDepth = null;
                for (const k of keys) {
                    const e = wasmResults[k];
                    if (pos !== "both" && pos !== e.label.toLowerCase()) continue;
                    if (e.depth !== lastDepth && lastDepth !== null) addSeparator();
                    lastDepth = e.depth;
                    addRow(e);
                }
            }

            runBtn.addEventListener("click", async () => {
                const maxDepth = +document.getElementById("max-depth").value;
                tbody.innerHTML = "";
                runBtn.disabled = true;

                for (let d = 6; d <= maxDepth; d++) {
                    statusEl.textContent = `Running depth ${d} / ${maxDepth}…`;
                    await new Promise((r) => setTimeout(r, 0));

                    const entries = JSON.parse(run_bench(d, 0));
                    const pos = document.getElementById("position").value;

                    if (d > 6) addSeparator();
                    for (const e of entries) {
                        wasmResults[`${e.depth}-${e.label}`] = e;
                        if (
                            pos === "both" ||
                            (pos === "start" && e.label === "Start") ||
                            (pos === "kiwipete" && e.label === "Kiwipete")
                        ) addRow(e);
                    }

                    await new Promise((r) => setTimeout(r, 0));
                }

                statusEl.textContent = "Done.";
                runBtn.disabled = false;
            });

            document.getElementById("load-native").addEventListener("click", () => {
                const errEl = document.getElementById("native-error");
                errEl.style.display = "none";
                try {
                    const raw = document.getElementById("native-json").value.trim();
                    const entries = JSON.parse(raw);
                    if (!Array.isArray(entries)) throw new Error("Expected a JSON array");
                    nativeResults = {};
                    for (const e of entries) {
                        nativeResults[`${e.depth}-${e.label}`] = e;
                    }
                    compareMode = true;
                    setCompareHeaders(true);
                    document.getElementById("native-badge").style.display = "block";
                    redrawTable();
                } catch (err) {
                    errEl.textContent = `Parse error: ${err.message}`;
                    errEl.style.display = "block";
                }
            });
        </script>
    </body>
</html>
