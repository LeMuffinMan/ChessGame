name: Build, Deploy WASM ChessGame & Create Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      dist-path: ${{ steps.build.outputs.dist-path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install cargo components
        run: |
          rustup component add rustfmt clippy

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --target wasm32-unknown-unknown

      - name: Cargo clippy
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: Install Trunk
        run: cargo install --locked trunk

      - name: Build with Trunk
        id: build
        run: |
          trunk build --release --public-url "/${GITHUB_REPOSITORY}/"
          echo "dist-path=dist" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chessgame-dist
          path: dist/

  deploy_pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: chessgame-dist
          path: dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  create_release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: chessgame-dist
          path: dist/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v1.0.0                # tu peux rendre ce tag dynamique
          name: ChessGame WASM Release
          artifacts: dist/
          draft: false
          prerelease: false

      #
