# .github/workflows/release.yml
name: Release Wasm ChessGame

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Cargo clippy (wasm)
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: Cargo clippy (native)
        run: cargo clippy -- -D warnings

      - name: Cargo test
        run: cargo test

      - name: Install Trunk
        run: |
          curl -sL https://github.com/thedodd/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar xz
          mv trunk ~/.cargo/bin/

      - name: Build
        run: trunk build --release --public-url "/" --no-sri

      - name: Package dist
        run: zip -r chessgame-wasm.zip dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: chessgame-wasm.zip
